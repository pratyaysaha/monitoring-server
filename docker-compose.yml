version: "3.8"

services:
  monitoring-api:
    build: .
    container_name: monitoring-api

    ports:
      - "${HOST_PORT:-4001}:${PORT:-4001}"

    env_file:
      - .env

    restart: unless-stopped

    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:${PORT-:4001}//api/ping" ]
      interval: 30s
      timeout: 5s
      retries: 3
